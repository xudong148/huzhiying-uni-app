spring:
  datasource:
    url: jdbc:h2:mem:huzhiying;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: localhost
      port: 6379

hzy:
  redis:
    enabled: false

management:
  health:
    redis:
      enabled: false
