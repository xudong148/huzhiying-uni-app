server:
  port: 8080

spring:
  application:
    name: huzhiying-platform
  datasource:
    url: ${HZY_DB_URL:jdbc:mysql://localhost:3306/huzhiying?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${HZY_DB_USERNAME:hzy}
    password: ${HZY_DB_PASSWORD:hzy123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${HZY_REDIS_HOST:localhost}
      port: ${HZY_REDIS_PORT:6379}
      timeout: 2s

springdoc:
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info

hzy:
  app:
    name: HuZhiYing
    runtime-mode: ${HZY_RUNTIME_MODE:live}
    city-whitelist: ${HZY_CITY_WHITELIST:Shanghai,Hangzhou,Suzhou,Nanjing}
  amap:
    enabled: true
    key: ${HZY_AMAP_KEY:}
  wechat:
    pay-enabled: ${HZY_WX_PAY_ENABLED:false}
    app-id: ${HZY_WX_APP_ID:}
    mch-id: ${HZY_WX_MCH_ID:}
    merchant-serial-number: ${HZY_WX_MERCHANT_SERIAL_NUMBER:}
    private-key: ${HZY_WX_PRIVATE_KEY:}
    private-key-path: ${HZY_WX_PRIVATE_KEY_PATH:}
    api-v3-key: ${HZY_WX_API_V3_KEY:}
    app-secret: ${HZY_WX_APP_SECRET:}
    notify-base-url: ${HZY_WX_NOTIFY_BASE_URL:}
    transaction-notify-path: ${HZY_WX_TRANSACTION_NOTIFY_PATH:/api/payments/wechat/notify/transactions}
    refund-notify-path: ${HZY_WX_REFUND_NOTIFY_PATH:/api/payments/wechat/notify/refunds}
    expire-minutes: ${HZY_WX_PAY_EXPIRE_MINUTES:30}
  redis:
    enabled: ${HZY_REDIS_ENABLED:true}
  storage:
    provider: local
